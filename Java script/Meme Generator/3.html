// Meme Generator!

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meme Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: white;
      text-align: center;
      padding: 30px;
    }
    #meme {
      max-width: 90%;
      border-radius: 10px;
      margin: 20px auto;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      background: #1db954;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background-color: #17a94b;
    }
    #info {
      margin-top: 10px;
      font-size: 16px;
      color: #ccc;
    }
  </style>
</head>
<body>

  <h1>Random Meme Generator</h1>
  <button onclick="getMeme()">Generate Meme</button>
  <div id="memeContainer">
    <img id="meme" src="" style="display:none;">
    <div id="info"></div>
  </div>

  <script>
    async function getMeme() {
      const response = await fetch("https://meme-api.com/gimme");
      const data = await response.json();

      const memeImg = document.getElementById("meme");
      const info = document.getElementById("info");
      
      memeImg.src = data.url;
      memeImg.style.display = "block";
      info.innerHTML = `${data.title}<br>Subreddit: r/${data.subreddit}`;
    }

    window.onload = getMeme;
  </script>

</body> 
</html>
