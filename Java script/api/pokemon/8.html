<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Pokemon</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
    }

    img {
      width: 300px;
      padding: 0%;
      margin-top: 5px;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>Pokemon</h1>

  <input type="text" id="pokemonInput" placeholder="Enter Pokemon name" /><br><br>
  <button onclick="getPokemon()">Search</button>
  <div id="pokemonDetails"></div>

  <script>
    async function getPokemon() {
      const name = document.getElementById("pokemonInput").value;
      const url = `https://pokeapi.co/api/v2/pokemon/${name}`;
      const Div = document.getElementById("pokemonDetails");

      try {
        const response = await fetch(url);
        const data = await response.json();

        Div.innerHTML = `
                  <img src="${data.sprites.other['official-artwork'].front_default}" />`

      } catch (error) {
        alert("Error");
      }
    }
  </script>
</body>

</html>
