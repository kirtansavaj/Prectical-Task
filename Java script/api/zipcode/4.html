<!-- In usa Enter zipcode and get details. -->
<!-- https://apipheny.io/free-api/ -->


<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            padding: 30px;
            text-align: center;
        }

        .city,
        .longitude,
        .latitude,
        .state,
        .state_abbr {
            text-align: center;
            padding: 30px;
            height: 10px;
        }
    </style>
</head>

<body>
    <h1>Area details</h1>
    <input type="text" id="zipcode" placeholder="Enter zipcode">
    <button onclick="getZipDetails()">Search</button>
    <div class="zip-box" id="zipBox"></div>
    <p id="result"></p>

    <script>
        async function getZipDetails() {
            const zip = document.getElementById('zipcode').value;
            const url = `https://api.zippopotam.us/us/${zip}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                const place = data.places[0];

                result.innerHTML = `<strong>city:</strong>${place["place name"]}<br><br>    
                                    <strong>state:</strong>${place["state"]}<br><br>    
                                    <strong>state_abbr:</strong>${place["state abbreviation"]}<br><br>  
                                    <strong>longitude:</strong>${place["longitude"]}<br><br>    
                                    <strong>latitude:</strong>${place["latitude"]}<br><br>  `
            } catch (error) {
                alert(error.message);
            }
        }


    </script>
</body>

</html>
