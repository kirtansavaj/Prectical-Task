<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Details Lookup</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            padding: 30px;
            text-align: center;
        }

    </style>
</head>

<body>
    <h1>Area Details</h1>
    <input type="text" id="pincode" placeholder="Enter pincode">
    <button onclick="getPinDetails()">Search</button>
    <p id="result"></p>

    <script>
        async function getPinDetails() {
            const pin = document.getElementById("pincode").value.trim();
            const result = document.getElementById("result");


            const url = `https://api.postalpincode.in/pincode/${pin}`;

            try {
                const res = await fetch(url);
                const data = await res.json();

                

                const place = data[0].PostOffice[0];

                result.innerHTML = `<strong>Name:</strong> ${place.Name}<br><br>    
                                    <strong>Branch Type:</strong> ${place.BranchType}<br><br>    
                                    <strong>District:</strong> ${place.District}<br><br>    
                                    <strong>State:</strong> ${place.State}<br><br>    
                                    <strong>Country:</strong> ${place.Country}`;
            } catch (error) {
                result.innerHTML = "Error fetching data.";
                console.error(error);
            }
        }
    </script>
</body>
</html>
