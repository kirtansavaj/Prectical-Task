<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Random Dog Image</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            text-align: center;
        }
        img {
            max-width: 300px;
            margin-top: 20px;
            border-radius: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Random Dog Image</h1>
    <button onclick="getDogImage()">Show dog</button>
    <div id="dogContainer"></div>

    <script>
        async function getDogImage() {
            const container = document.getElementById('dogContainer');
            const url = 'https://dog.ceo/api/breeds/image/random';

            try {
                const response = await fetch(url);
                const data = await response.json();

                container.innerHTML = `<img src="${data.message}" alt="Random Dog">`;
            } catch (error) {
                container.innerHTML = "error";
            }
        }
    </script>

</body>
</html>
