<!-- In usa Enter pincode and get details. -->
<!-- https://apipheny.io/free-api/ -->


<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

  
</head>

<body>
    <h1>Area details</h1>
    <input type="text" id="pincode" placeholder="Enter pincode">
    <button onclick="getPinDetails()">Search</button>
    <p id="result"></p>

    <script>
        async function getPinDetails() {
            const pin = document.getElementById('pincode').value;
            const url = `http://www.postalpincode.in/api/pincode/${pin}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                const place = data[0].PostOffice[0];

                result.innerHTML = `<strong>Name:</strong>${place.Name}<br><br>    
                                    <strong>Branch Type:</strong>${place.BranchType}<br><br>    
                                    <strong>District:</strong>${place.Taluk}<br><br>  
                                    <strong>State:</strong>${place.District}<br><br>    
                                    <strong>Country:</strong>${place.State}<br><br>  `
            } catch (error) {
                alert(error);
            }
        }


    </script>
</body>

</html>
